<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <script src="index.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap"
      rel="stylesheet" />
  </head>
  <body>
    <div class="search-container">
      <form class="form" id="search-form">
        <label for="search-input">What's the weather like in</label>
        <input
          type="text"
          name="search-input"
          id="search-input"
          class="form__input"
          required />
        <span>?</span>
      </form>
    </div>

    <div class="weather-card">
      <div class="weather-card__container">
        <div class="weather-card__date" id="current-date"></div>
        <div class="weather-card__condition-container">
          <div class="weather-card__temperature-container">
            <img
              src=""
              alt="Weather icon"
              class="weather-card__icon"
              id="current-icon" />
            <h1 class="weather-card__temperature" id="current-temperature"></h1>
          </div>
          <div class="weather-card__condition" id="current-condition"></div>
        </div>
      </div>
    </div>
  </body>
</html>
